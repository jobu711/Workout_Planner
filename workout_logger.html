<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Workout Logger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --accent: #e94560;
            --accent-green: #27ae60;
            --accent-blue: #3498db;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #2a2a4e;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }

        /* Fixed Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-primary);
            padding: calc(var(--safe-top) + 12px) 16px 12px;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 56px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            margin-right: 12px;
        }

        .header-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            min-height: 44px;
            min-width: 44px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .header-btn.secondary {
            background: var(--bg-card);
        }

        .header-btn.finish {
            background: var(--accent-green);
        }

        /* Main Content Area */
        .main-content {
            padding-top: calc(var(--safe-top) + 68px);
            padding-bottom: calc(var(--safe-bottom) + 80px);
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Screens */
        .screen {
            display: none;
            padding: 16px;
        }

        .screen.active {
            display: block;
        }

        /* Home Screen - Routine Selection */
        .import-section {
            margin-bottom: 24px;
        }

        #file-input {
            position: absolute;
            left: -9999px;
            opacity: 0;
            width: 1px;
            height: 1px;
        }

        .import-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: var(--bg-card);
            border: 2px dashed var(--border-color);
            color: var(--text-primary);
            padding: 20px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            min-height: 60px;
            -webkit-tap-highlight-color: rgba(255,255,255,0.1);
        }

        .import-btn:active {
            background: var(--bg-secondary);
        }

        .routine-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .routine-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .routine-card:active {
            transform: scale(0.98);
        }

        .routine-card h3 {
            font-size: 18px;
            margin-bottom: 6px;
        }

        .routine-card p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .routine-card .delete-routine {
            float: right;
            background: var(--accent);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-left: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state p {
            margin-bottom: 8px;
        }

        /* Workout Screen */
        .workout-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Exercise Cards */
        .exercise-card {
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .exercise-header {
            padding: 14px 16px;
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exercise-name {
            font-size: 16px;
            font-weight: 600;
        }

        .exercise-target {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .exercise-sets {
            padding: 12px;
        }

        .set-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 50px;
            gap: 10px;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .set-row:last-child {
            border-bottom: none;
        }

        .set-number {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
        }

        .set-input {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 12px;
            font-size: 16px;
            text-align: center;
            min-height: 44px;
            width: 100%;
        }

        .set-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .set-input::placeholder {
            color: var(--text-secondary);
        }

        .set-check {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .set-check.completed {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: white;
        }

        .add-set-btn {
            width: 100%;
            background: transparent;
            border: 1px dashed var(--border-color);
            color: var(--text-secondary);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            min-height: 44px;
        }

        .add-set-btn:active {
            background: rgba(255,255,255,0.05);
        }

        /* Rest Timer */
        .rest-timer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            padding: 12px 16px calc(var(--safe-bottom) + 12px);
            z-index: 90;
        }

        .timer-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .timer-btn {
            flex: 1;
            background: var(--bg-card);
            border: none;
            color: var(--text-primary);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
        }

        .timer-btn:active {
            background: var(--bg-secondary);
        }

        .timer-btn.active {
            background: var(--accent-blue);
        }

        .timer-display {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .timer-display.active {
            display: flex;
        }

        .timer-countdown {
            font-size: 36px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 80px;
            text-align: center;
        }

        .timer-countdown.warning {
            color: var(--accent);
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        .timer-cancel {
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            min-height: 44px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: calc(var(--safe-top) + 80px);
            left: 16px;
            right: 16px;
            background: var(--accent-green);
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            z-index: 200;
            transform: translateY(-120%);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: var(--accent);
        }

        /* Confirmation Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            text-align: center;
        }

        .modal h3 {
            margin-bottom: 12px;
            font-size: 20px;
        }

        .modal p {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            min-height: 48px;
        }

        .modal-btn.cancel {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .modal-btn.confirm {
            background: var(--accent-green);
            color: white;
        }

        .modal-btn.danger {
            background: var(--accent);
            color: white;
        }

        /* Input Labels */
        .input-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: block;
        }

        /* Header row for sets */
        .sets-header {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 50px;
            gap: 10px;
            padding: 0 0 8px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 4px;
        }

        .sets-header span {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-align: center;
        }

        /* Responsive adjustments */
        @media (max-width: 374px) {
            .timer-countdown {
                font-size: 28px;
            }
            .stat-value {
                font-size: 24px;
            }
        }

        @media (min-width: 429px) {
            .main-content {
                max-width: 428px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Header -->
    <header class="header" id="header">
        <span class="header-title" id="header-title">Workout Logger</span>
        <button class="header-btn secondary" id="header-action" style="display: none;">Back</button>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Home Screen -->
        <div class="screen active" id="home-screen">
            <div class="import-section">
                <input type="file" id="file-input" accept="application/json,.json,text/plain,*/*" onchange="handleFileImport(event)">
                <label for="file-input" class="import-btn">
                    + Import Routine from JSON
                </label>
            </div>

            <h2 style="margin-bottom: 16px; font-size: 16px; color: var(--text-secondary);">Your Routines</h2>

            <div class="routine-list" id="routine-list">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Workout Screen -->
        <div class="screen" id="workout-screen">
            <div class="workout-stats">
                <div class="stat-card">
                    <div class="stat-value" id="total-sets">0</div>
                    <div class="stat-label">Sets Done</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-volume">0</div>
                    <div class="stat-label">Total Volume (lbs)</div>
                </div>
            </div>

            <div id="exercises-container">
                <!-- Populated by JS -->
            </div>
        </div>
    </main>

    <!-- Rest Timer (shown during workout) -->
    <div class="rest-timer" id="rest-timer" style="display: none;">
        <div class="timer-buttons" id="timer-buttons">
            <button class="timer-btn" onclick="startTimer(60)">60s</button>
            <button class="timer-btn" onclick="startTimer(90)">90s</button>
            <button class="timer-btn" onclick="startTimer(120)">120s</button>
        </div>
        <div class="timer-display" id="timer-display">
            <span class="timer-countdown" id="timer-countdown">0:00</span>
            <button class="timer-cancel" onclick="cancelTimer()">Cancel</button>
        </div>
    </div>

    <!-- Finish Workout Modal -->
    <div class="modal-overlay" id="finish-modal">
        <div class="modal">
            <h3>Finish Workout?</h3>
            <p>You completed <span id="modal-sets">0</span> sets with <span id="modal-volume">0</span> lbs total volume.</p>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeFinishModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="confirmFinishWorkout()">Finish</button>
            </div>
        </div>
    </div>

    <!-- Delete Routine Modal -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal">
            <h3>Delete Routine?</h3>
            <p>This will remove the routine from your list.</p>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeDeleteModal()">Cancel</button>
                <button class="modal-btn danger" onclick="confirmDeleteRoutine()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let routines = [];
        let activeWorkout = null;
        let timerInterval = null;
        let timerEndTime = null;
        let pendingDeleteId = null;

        // Storage Keys
        const ROUTINES_KEY = 'workoutLoggerRoutines';
        const ACTIVE_WORKOUT_KEY = 'workoutLoggerActive';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadRoutines();
            loadActiveWorkout();
            renderRoutineList();

            // Check if we have an active workout to resume
            if (activeWorkout) {
                showWorkoutScreen();
            }
        });

        // Storage Functions
        function loadRoutines() {
            const saved = localStorage.getItem(ROUTINES_KEY);
            if (saved) {
                try {
                    routines = JSON.parse(saved);
                } catch (e) {
                    routines = [];
                }
            }
        }

        function saveRoutines() {
            localStorage.setItem(ROUTINES_KEY, JSON.stringify(routines));
        }

        function loadActiveWorkout() {
            const saved = localStorage.getItem(ACTIVE_WORKOUT_KEY);
            if (saved) {
                try {
                    activeWorkout = JSON.parse(saved);
                } catch (e) {
                    activeWorkout = null;
                }
            }
        }

        function saveActiveWorkout() {
            if (activeWorkout) {
                localStorage.setItem(ACTIVE_WORKOUT_KEY, JSON.stringify(activeWorkout));
            } else {
                localStorage.removeItem(ACTIVE_WORKOUT_KEY);
            }
        }

        // Import Functions
        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    importRoutines(data);
                } catch (err) {
                    showToast('Invalid JSON file', true);
                }
            };
            reader.readAsText(file);

            // Reset input so same file can be imported again
            event.target.value = '';
        }

        function importRoutines(data) {
            // Handle both single routine and array of routines
            const imported = Array.isArray(data) ? data : [data];

            let addedCount = 0;
            imported.forEach(routine => {
                // Validate routine structure
                if (routine.name && Array.isArray(routine.exercises)) {
                    // Check for duplicates by name
                    const exists = routines.some(r => r.name === routine.name);
                    if (!exists) {
                        routines.push({
                            id: routine.id || Date.now().toString() + Math.random().toString(36).substr(2, 9),
                            name: routine.name,
                            exercises: routine.exercises.map(ex => ({
                                name: ex.name || 'Unknown Exercise',
                                sets: ex.sets || '3',
                                reps: ex.reps || '10'
                            }))
                        });
                        addedCount++;
                    }
                }
            });

            if (addedCount > 0) {
                saveRoutines();
                renderRoutineList();
                showToast(`Imported ${addedCount} routine${addedCount > 1 ? 's' : ''}`);
            } else {
                showToast('No new routines to import', true);
            }
        }

        // Render Functions
        function renderRoutineList() {
            const container = document.getElementById('routine-list');

            if (routines.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No routines yet</p>
                        <p>Import a routine from workout_plan.html to get started</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = routines.map(routine => `
                <div class="routine-card" onclick="startWorkout('${routine.id}')">
                    <button class="delete-routine" onclick="event.stopPropagation(); showDeleteModal('${routine.id}')">X</button>
                    <h3>${escapeHtml(routine.name)}</h3>
                    <p>${routine.exercises.length} exercise${routine.exercises.length !== 1 ? 's' : ''}</p>
                </div>
            `).join('');
        }

        function renderWorkout() {
            if (!activeWorkout) return;

            const container = document.getElementById('exercises-container');
            container.innerHTML = activeWorkout.exercises.map((exercise, exIndex) => `
                <div class="exercise-card">
                    <div class="exercise-header">
                        <div>
                            <div class="exercise-name">${escapeHtml(exercise.name)}</div>
                            <div class="exercise-target">${exercise.targetSets} sets x ${exercise.targetReps} reps</div>
                        </div>
                    </div>
                    <div class="exercise-sets">
                        <div class="sets-header">
                            <span>Set</span>
                            <span>Reps</span>
                            <span>Weight</span>
                            <span></span>
                        </div>
                        ${exercise.sets.map((set, setIndex) => `
                            <div class="set-row">
                                <span class="set-number">${setIndex + 1}</span>
                                <input type="number"
                                       inputmode="numeric"
                                       pattern="[0-9]*"
                                       class="set-input"
                                       placeholder="reps"
                                       value="${set.reps || ''}"
                                       onchange="updateSet(${exIndex}, ${setIndex}, 'reps', this.value)"
                                       ${set.completed ? 'readonly' : ''}>
                                <input type="number"
                                       inputmode="decimal"
                                       class="set-input"
                                       placeholder="lbs"
                                       value="${set.weight || ''}"
                                       onchange="updateSet(${exIndex}, ${setIndex}, 'weight', this.value)"
                                       ${set.completed ? 'readonly' : ''}>
                                <button class="set-check ${set.completed ? 'completed' : ''}"
                                        onclick="toggleSetComplete(${exIndex}, ${setIndex})">
                                    ${set.completed ? '&#10003;' : ''}
                                </button>
                            </div>
                        `).join('')}
                        <button class="add-set-btn" onclick="addSet(${exIndex})">+ Add Set</button>
                    </div>
                </div>
            `).join('');

            updateStats();
        }

        function updateStats() {
            if (!activeWorkout) return;

            let totalSets = 0;
            let totalVolume = 0;

            activeWorkout.exercises.forEach(exercise => {
                exercise.sets.forEach(set => {
                    if (set.completed) {
                        totalSets++;
                        const reps = parseFloat(set.reps) || 0;
                        const weight = parseFloat(set.weight) || 0;
                        totalVolume += reps * weight;
                    }
                });
            });

            document.getElementById('total-sets').textContent = totalSets;
            document.getElementById('total-volume').textContent = totalVolume.toLocaleString();
        }

        // Workout Functions
        function startWorkout(routineId) {
            const routine = routines.find(r => r.id === routineId);
            if (!routine) return;

            activeWorkout = {
                routineId: routine.id,
                routineName: routine.name,
                startTime: Date.now(),
                exercises: routine.exercises.map(ex => ({
                    name: ex.name,
                    targetSets: ex.sets,
                    targetReps: ex.reps,
                    sets: [{ reps: '', weight: '', completed: false }]
                }))
            };

            saveActiveWorkout();
            showWorkoutScreen();
        }

        function showWorkoutScreen() {
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('workout-screen').classList.add('active');

            document.getElementById('header-title').textContent = activeWorkout.routineName;

            const headerAction = document.getElementById('header-action');
            headerAction.textContent = 'Finish';
            headerAction.className = 'header-btn finish';
            headerAction.style.display = 'block';
            headerAction.onclick = showFinishModal;

            document.getElementById('rest-timer').style.display = 'block';

            renderWorkout();
        }

        function showHomeScreen() {
            document.getElementById('workout-screen').classList.remove('active');
            document.getElementById('home-screen').classList.add('active');

            document.getElementById('header-title').textContent = 'Workout Logger';
            document.getElementById('header-action').style.display = 'none';
            document.getElementById('rest-timer').style.display = 'none';

            cancelTimer();
            renderRoutineList();
        }

        function updateSet(exerciseIndex, setIndex, field, value) {
            if (!activeWorkout) return;

            activeWorkout.exercises[exerciseIndex].sets[setIndex][field] = value;
            saveActiveWorkout();
            updateStats();
        }

        function toggleSetComplete(exerciseIndex, setIndex) {
            if (!activeWorkout) return;

            const set = activeWorkout.exercises[exerciseIndex].sets[setIndex];
            set.completed = !set.completed;

            saveActiveWorkout();
            renderWorkout();

            // Vibrate on completion
            if (set.completed && navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        function addSet(exerciseIndex) {
            if (!activeWorkout) return;

            const exercise = activeWorkout.exercises[exerciseIndex];
            const lastSet = exercise.sets[exercise.sets.length - 1];

            // Copy values from last set as defaults
            exercise.sets.push({
                reps: lastSet?.reps || '',
                weight: lastSet?.weight || '',
                completed: false
            });

            saveActiveWorkout();
            renderWorkout();
        }

        // Timer Functions
        function startTimer(seconds) {
            cancelTimer();

            timerEndTime = Date.now() + (seconds * 1000);

            document.getElementById('timer-buttons').style.display = 'none';
            document.getElementById('timer-display').classList.add('active');

            updateTimerDisplay();
            timerInterval = setInterval(updateTimerDisplay, 100);
        }

        function updateTimerDisplay() {
            const remaining = Math.max(0, timerEndTime - Date.now());
            const seconds = Math.ceil(remaining / 1000);

            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;

            const countdown = document.getElementById('timer-countdown');
            countdown.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

            // Warning state at 5 seconds
            if (seconds <= 5 && seconds > 0) {
                countdown.classList.add('warning');
            } else {
                countdown.classList.remove('warning');
            }

            if (remaining <= 0) {
                timerComplete();
            }
        }

        function timerComplete() {
            cancelTimer();

            // Vibrate pattern
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200, 100, 200]);
            }

            // Flash the screen
            document.body.style.background = 'var(--accent-green)';
            setTimeout(() => {
                document.body.style.background = '';
            }, 300);

            showToast('Rest complete!');
        }

        function cancelTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            document.getElementById('timer-buttons').style.display = 'flex';
            document.getElementById('timer-display').classList.remove('active');
            document.getElementById('timer-countdown').classList.remove('warning');
        }

        // Modal Functions
        function showFinishModal() {
            let totalSets = 0;
            let totalVolume = 0;

            if (activeWorkout) {
                activeWorkout.exercises.forEach(exercise => {
                    exercise.sets.forEach(set => {
                        if (set.completed) {
                            totalSets++;
                            const reps = parseFloat(set.reps) || 0;
                            const weight = parseFloat(set.weight) || 0;
                            totalVolume += reps * weight;
                        }
                    });
                });
            }

            document.getElementById('modal-sets').textContent = totalSets;
            document.getElementById('modal-volume').textContent = totalVolume.toLocaleString();
            document.getElementById('finish-modal').classList.add('show');
        }

        function closeFinishModal() {
            document.getElementById('finish-modal').classList.remove('show');
        }

        function confirmFinishWorkout() {
            closeFinishModal();

            activeWorkout = null;
            saveActiveWorkout();

            showToast('Workout complete!');
            showHomeScreen();
        }

        function showDeleteModal(routineId) {
            pendingDeleteId = routineId;
            document.getElementById('delete-modal').classList.add('show');
        }

        function closeDeleteModal() {
            pendingDeleteId = null;
            document.getElementById('delete-modal').classList.remove('show');
        }

        function confirmDeleteRoutine() {
            if (pendingDeleteId) {
                routines = routines.filter(r => r.id !== pendingDeleteId);
                saveRoutines();
                renderRoutineList();
                showToast('Routine deleted');
            }
            closeDeleteModal();
        }

        // Utility Functions
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Prevent double-tap zoom on buttons
        document.addEventListener('touchend', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') {
                e.preventDefault();
                e.target.click();
            }
        }, { passive: false });
    </script>
</body>
</html>
